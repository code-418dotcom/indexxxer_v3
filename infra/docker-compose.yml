name: indexxxer

# Shared backend config (backend API + celery worker use the same image / env)
x-backend: &backend
  build:
    context: ../backend
    target: dev
  env_file: ../.env
  volumes:
    - ../backend:/app                            # hot reload: source mounted at runtime
    - ${MEDIA_ROOT:-/mnt/e/media}:/media:ro      # media library, read-only
    - thumbnails:/data/thumbnails                # generated thumbnails
    - performers:/data/performers                # performer profile images
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: indexxxer
      POSTGRES_USER: indexxxer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indexxxer_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexxxer -d indexxxer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    <<: *backend
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app

  # ── Celery worker ─────────────────────────────────────────────────────────────
  # Queues:
  #   indexing   — filesystem scan, metadata extraction
  #   thumbnails — thumbnail generation (CPU-bound, resumable)
  #   hashing    — async SHA-256 computation
  #   ai         — Ollama summaries, face clustering, AI backfill
  worker:
    <<: *backend
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=indexing,thumbnails,hashing,ai,webhooks
        --concurrency=4
        --hostname=worker@%h
    # No external port — worker communicates via Redis only

  # ── GPU Celery worker (CLIP embeddings) ───────────────────────────────────────
  # Requires NVIDIA Container Toolkit on the host.
  # Opt-in: `docker compose --profile gpu up` or set COMPOSE_PROFILES=gpu.
  gpu_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.ml
    env_file: ../.env
    volumes:
      - ../backend:/app
      - ${MEDIA_ROOT:-/mnt/e/media}:/media:ro
      - thumbnails:/data/thumbnails
      - clip_models:/root/.cache/clip
      - hf_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --queues=ml
        --concurrency=1
        --hostname=gpu_worker@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: [gpu]
    restart: unless-stopped

  # ── Celery beat scheduler ─────────────────────────────────────────────────────
  # Runs the celery-beat periodic task scheduler (one instance only).
  beat:
    <<: *backend
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --scheduler celery.beat.PersistentScheduler
        --schedule /tmp/celerybeat-schedule
    # No external port — communicates via Redis only

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      target: dev
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/next.config.ts:/app/next.config.ts
      - ../frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ../frontend/postcss.config.mjs:/app/postcss.config.mjs
      - frontend_next:/app/.next              # preserve .next build cache
    ports:
      - "3000:3000"
    environment:
      # Container-to-container: Next.js rewrites proxy /api → backend:8000
      BACKEND_URL: "http://backend:8000"
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  # ── NSFW AI Tagger ──────────────────────────────────────────────────────────
  # Purpose-built adult content tagger. Opt-in: --profile tagger
  # Setup: clone https://github.com/skier233/nsfw_ai_model_server next to this repo
  # and run select_models.sh to download the free model.
  nsfw_tagger:
    build:
      context: ${NSFW_TAGGER_PATH:-../../nsfw_ai_model_server}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ${MEDIA_ROOT:-/mnt/e/media}:/media:ro
    ports:
      - "8001:8000"
    profiles: [tagger]
    restart: unless-stopped

volumes:
  postgres_data:
  clip_models:
  hf_models:
  thumbnails:
    # Bind mount so thumbnails persist on host at ./data/thumbnails
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${THUMBNAIL_ROOT:-../data/thumbnails}
  performers:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PERFORMERS_ROOT:-../data/performers}
  frontend_next:
